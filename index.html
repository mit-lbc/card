            margin-bottom: 35px;

        }
        
        .qr-link {
            text-decoration: none;
            display: inline-block;
            margin-bottom: 10px;
            cursor: pointer;

        .qr-link:active {
            transform: scale(0.98);
        }
        
        .qr-wrapper {

            padding: 20px;

            border-radius: 20px;

        #qr {

        }
        
        .qr-instruction {

            color: #8e8373;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
        }
        
        .info-container { 
            font-size: 13px; 
            color: #a6a6a6; 
            line-height: 2; 
            letter-spacing: 0.5px; 
            text-align: left; 
            max-width: 270px; 
            margin: 0 auto; 
        }
        
        .info-row { 
            display: flex;
            align-items: center;
            margin-bottom: 10px; 
        }
        
        .icon { 
            color: #d4af37; 
            margin-right: 14px; 
            font-size: 15px;
            width: 18px; 
            text-align: center; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

            height: 16px;
        }
        
        .text {
            white-space: nowrap;
