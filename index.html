<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bella Cucina - Tarjeta Digital</title>
    <!-- Librería para generar el QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <!-- Importamos Montserrat para tus datos y cargo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #032127; /* Fondo oscuro exterior */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .card {
            background-color: #003840; /* El azul petróleo exacto de tu diseño */
            border-radius: 25px;
            padding: 40px 18px 30px 18px;
            width: 100%;
            max-width: 290px; /* Tarjeta ultra esbelta y elegante */
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6), 0 0 15px rgba(212, 175, 55, 0.1);
            
            /* CONTORNO DEL FRAME EXTERNO EN DORADO ELEGANTE */
            border: 2px solid #d4af37; 
        }
        
        /* CONTENEDOR DE LA IMAGEN DEL LOGO INTEGRAL */
        .brand-container {
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
        }
        
        .brand-logo-img {
            width: 100%;
            max-width: 230px; 
            height: auto;
            display: block;
        }
        
        /* DATOS DEL TITULAR */
        .user-name {
            font-size: 22px; 
            font-weight: 400;
            color: #ffffff;
            margin: 0 0 6px 0;
            letter-spacing: 0.5px;
        }
        
        .user-title {
            font-size: 10px;
            color: #799a9f; 
            margin: 0 0 35px 0;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        /* BLOQUE GENERAL DEL QR */
        .qr-section {
            margin-bottom: 35px;
        }

        /* CAJA CONTENEDORA QUE AJUSTA EL BORDE AL LÍMITE REAL */
        .qr-border-box {
            display: inline-block;
            line-height: 0;
            border-radius: 12px; 
            border: 2px solid #d4af37; 
            overflow: hidden; 
        }
        
        #qr {
            display: block;
            margin: 0;
            padding: 0;
        }
        
        /* TEXTO FUERA DEL CONTORNO */
        .qr-text {
            font-size: 11px;
            color: #799a9f;
            margin: 15px 0 0 0;
            letter-spacing: 0.5px;
        }
        
        /* LISTA DE CONTACTOS */
        .info-container {
            text-align: left;
            padding: 0 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 25px;
        }
        
        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            font-size: 12.5px; 
        }
        
        .icon {
            color: #d4af37; 
            margin-right: 12px;
            font-size: 14px;
            width: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .icon svg {
            width: 15px;
            height: 15px;
            fill: #d4af37;
        }
        
        .text {
            color: #e6eded;
        }
        
        .card-link {
            color: #e6eded;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .card-link:hover {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- TU IMAGEN DE CORELDRAW -->
        <div class="brand-container">
            <img src="logo-corporativo.png" alt="VGN S.A. La Bella Cucina" class="brand-logo-img">
        </div>
        
        <!-- DATOS DEL PERSONAL -->
        <h1 class="user-name">Mitchell Livieres</h1>
        <div class="user-title">Foreign Trade & IT Manager</div>
        
        <!-- SECCIÓN DEL QR -->
        <div class="qr-section">
            <div class="qr-border-box">
                <canvas id="qr"></canvas>
            </div>
            <p class="qr-text">Escanea para agendar físicamente</p>
        </div>
        
        <!-- INFORMACIÓN DE CONTACTO -->
        <div class="info-container">
            <div class="info-row">
                <span class="icon">✆</span>
                <span class="text"><a href="tel:+595985496809" class="card-link">+595 985 496809</a></span>
            </div>
            <div class="info-row">
                <span class="icon">✉</span>
                <span class="text"><a href="mailto:mitchell@LBC.com.py" class="card-link">mitchell@LBC.com.py</a></span>
            </div>
            <div class="info-row">
                <span class="icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
                    </svg>
                </span>
                <span class="text"><a href="https://www.instagram.com/labellacucinapy/" target="_blank" class="card-link">@labellacucinapy</a></span>
            </div>
            <div class="info-row">
                <span class="icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </span>
                <span class="text"><a href="https://maps.google.com/?q=La+Bella+Cucina+Avda+Sacramento+975+Asuncion" target="_blank" class="card-link">Avda. Sacramento 975, Asunción</a></span>
            </div>
        </div>
    </div>

<script>
    const vcardData = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        "N:Livieres;Mitchell;;;",
        "FN:Mitchell Livieres",
        "ORG:La Bella Cucina",
        "TEL;TYPE=CELL:+595985496809",
        "EMAIL;TYPE=INTERNET:mitchell@LBC.com.py",
        "END:VCARD"
    ].join("\n");

    window.onload = function() {
        new QRious({
            element: document.getElementById('qr'),
            size: 180, /* RESTAURADO A 180PX: Llena el contenedor de forma perfecta */
            background: '#003840', 
            foreground: '#d4af37', 
            level: 'M',
            value: vcardData
        });
    };
</script>

</body>
</html>
