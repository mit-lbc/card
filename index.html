<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitchell Livieres - Tarjeta Digital</title>
    <!-- Cargamos la librería para el QR que se queda -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .sub-logo {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 25px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #d4af37;
            object-fit: cover;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
            color: #ffffff;
        }
        .title {
            font-size: 14px;
            color: #d4af37;
            margin: 0 0 25px 0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .qr-container {
            background-color: #1a1a1a;
            padding: 15px;
            display: inline-block;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #333;
        }
        .qr-container p {
            font-size: 11px;
            color: #888;
            margin: 8px 0 0 0;
        }
        .info-container {
            text-align: left;
            margin-top: 10px;
        }
        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .icon {
            color: #d4af37;
            margin-right: 15px;
            font-size: 18px;
            width: 20px;
            text-align: center;
        }
        .text {
            color: #ccc;
        }
        .card-link {
            color: #ccc;
            text-decoration: none;
            transition: color 0.3s;
        }
        .card-link:hover {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">LBC</div>
        <div class="sub-logo">La Bella Cucina</div>
        
        <!-- Tu foto ejecutiva -->
        <img src="foto.jpg" alt="Mitchell Livieres" class="profile-img">
        
        <h1>Mitchell Livieres</h1>
        <div class="title">Foreign Trade & IT Manager</div>
        
        <!-- El QR Dorado para escaneo presencial -->
        <div class="qr-container">
            <canvas id="qr"></canvas>
            <p>Escanea para agendar físicamente</p>
        </div>
        
        <!-- Información de contacto con links funcionando -->
        <div class="info-container">
            <div class="info-row">
                <span class="icon">✆</span>
                <span class="text"><a href="tel:+595985496809" class="card-link">+595 985 496809</a></span>
            </div>
            <div class="info-row">
                <span class="icon">✉</span>
                <span class="text"><a href="mailto:mitchell@LBC.com.py" class="card-link">mitchell@LBC.com.py</a></span>
            </div>
            <div class="info-row">
                <span class="icon">🔗</span>
                <span class="text"><a href="https://www.instagram.com/labellacucinapy/" target="_blank" class="card-link">@labellacucinapy</a></span>
            </div>
            <div class="info-row">
                <span class="icon">📍</span>
                <span class="text"><a href="https://maps.google.com/?q=La+Bella+Cucina+Avda+Sacramento+975+Asuncion" target="_blank" class="card-link">Avda. Sacramento 975, Asunción</a></span>
            </div>
        </div>
    </div>

<script>
    // QR Simplificado al máximo para que los puntos sean grandes y rápidos de escanear
    const vcardData = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        "FN:Mitchell Livieres",
        "ORG:La Bella Cucina",
        "TEL;TYPE=CELL:+595985496809",
        "EMAIL;TYPE=INTERNET:mitchell@LBC.com.py",
        "END:VCARD"
    ].join("\n");

    window.onload = function() {
        new QRious({
            element: document.getElementById('qr'),
            size: 200,
            background: '#1a1a1a',
            foreground: '#d4af37', 
            level: 'M', // Bajamos la redundancia a 'M' para agrandar aún más los puntos visuales
            value: vcardData
        });
    };
</script>
</body>
</html>
